<!DOCTYPE html>
<html>
<head>
    <title>Neon Digital Clock</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Orbitron', sans-serif; }
        #clock {
            color: #0f0; text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
            font-size: 8rem; letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <script>
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0') + ":" + 
                         now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
